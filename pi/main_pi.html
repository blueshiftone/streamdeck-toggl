<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>one.blueshift.streamdeck.toggl.pi</title>
  <link rel="stylesheet" href="sdpi.css">
  <script src="main_pi.js"></script>
  <style>
    .hidden, .hiddenError, .hiddenAll {
      display: none;
    }
    #tagDropdown {
      padding: 0 !important;
    }
    .tag-toggle {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 26px;
      box-sizing: border-box;
      padding: 0 20px 0 4px;
      cursor: pointer;
      border: 1pt solid #303030;
      border-radius: var(--sdpi-borderradius);
      background: var(--sdpi-background) url(caret.svg) no-repeat 97% center;
      color: var(--sdpi-color);
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tagPanel {
      border: 1pt solid #303030;
      border-top: none;
      background: var(--sdpi-background);
      border-radius: var(--sdpi-borderradius);
    }
    #tagSearch {
      width: 100%;
      box-sizing: border-box;
      padding: 3px 4px;
      background: rgba(0,0,0,0.2);
      border: none;
      border-bottom: 1pt solid #303030;
      color: var(--sdpi-color);
      outline: none;
    }
    #tagList {
      max-height: 88px;
      overflow-y: auto;
    }
    .tag-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 4px;
      color: var(--sdpi-color);
      cursor: pointer;
    }
    .tag-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .tag-item input[type="checkbox"] {
      display: inline-block !important;
      -webkit-appearance: auto !important;
      appearance: auto !important;
      width: 12px;
      height: 12px;
      margin: 0;
      cursor: pointer;
      accent-color: #e01b5d;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="sdpi-wrapper hiddenAll">
    <div class="sdpi-item">
      <div class="sdpi-item-label">API Token</div>
      <input class="sdpi-item-value" id="apitoken" value="" pattern="[a-z0-9]+" placeholder="Enter your Private API Token" onchange="setAPIToken()" required>
    </div>
    <div class="sdpi-item-child hiddenError" id="error">
      <p class="message caution" id="errorMessage"</p>
    </div>
    <div class="sdpi-item" id="apiFrequencyWrapper">
      <div class="sdpi-item-label">API Frequency</div>
      <select class="sdpi-item-value select" id="apiFrequency" onchange="sendSettings()" required>
        <option value="5">Start + Stop + Check every 5 seconds</option>
        <option value="60">Start + Stop + Check every minute</option>
        <option value="300">Start + Stop + Check every 5 minutes</option>
        <option value="600" selected>Start + Stop + Check every 10 minutes</option>
        <option value="3600">Start + Stop + Check every hour</option>
      </select>
    </div>
    <hr>
    <div class="sdpi-item invalidHidden hidden" id="labelWrapper">
      <div class="sdpi-item-label">Button Label</div>
      <input class="sdpi-item-value" id="label" value="" placeholder="Label" onchange="sendSettings()">
    </div>
    <div class="sdpi-item invalidHidden hidden" id="activityWrapper">
      <div class="sdpi-item-label">Entry Name</div>
      <input class="sdpi-item-value" id="activity" value="" placeholder="What are you doing?" onchange="sendSettings()">
    </div>
    <div class="sdpi-item invalidHidden hidden" id="workspaceWrapper">
      <div class="sdpi-item-label">Workspace</div>
      <select class="sdpi-item-value select" id="wid" onchange="setWorkspace()" required>
        <option value="0"></option>
      </select>
    </div>
    <div class="sdpi-item-child hiddenError" id="workspaceError">
      <p class="message caution">Please select a workspace!</p>
    </div>
    <div class="sdpi-item invalidHidden hidden" id="projectWrapper">
      <div class="sdpi-item-label">Project</div>
      <select class="sdpi-item-value select" id="pid" onchange="setProject()">
        <option value="0"></option>
      </select>
    </div>
    <div class="sdpi-item invalidHidden hidden" id="taskWrapper">
      <div class="sdpi-item-label">Task</div>
      <select class="sdpi-item-value select" id="tid" onchange="sendSettings()">
        <option value="0"></option>
      </select>
    </div>
    <div class="sdpi-item invalidHidden hidden" id="tagWrapper">
      <div class="sdpi-item-label">Tags</div>
      <div class="sdpi-item-value" id="tagDropdown">
        <div class="tag-toggle" id="tagToggle" onclick="toggleTagDropdown()">
          <span id="tagPreview"></span>
        </div>
        <div class="hidden" id="tagPanel">
          <input type="text" id="tagSearch" placeholder="Search..." oninput="filterTags()" autocomplete="off">
          <div id="tagList"></div>
        </div>
      </div>
    </div>
    <div class="sdpi-item invalidHidden hidden" id="billableWrapper">
      <div class="sdpi-item-label">Billable</div>
      <select class="sdpi-item-value select" id="billable" onchange="sendSettings()">
        <option value="0" selected>No</option>
        <option value="1">Yes (paid Toggl plans only)</option>
      </select>
    </div>
    <div class="sdpi-item invalidHidden hidden" id="trackingModeWrapper">
      <div class="sdpi-item-label">Tracking Mode</div>
      <select class="sdpi-item-value select" id="trackingmode" onchange="sendSettings()">
        <option value="0" selected>Exact Match</option>
        <option value="3">Starts With Description</option>
        <option value="1">Match Ignoring Description</option>
        <option value="2">Fallback (if no other button matches)</option>
      </select>
    </div>
    <div class="sdpi-item">
      <details>
        <summary>Links</summary>
        <div class="sdpi-item-child"><a onclick="openPage('track.toggl.com/timer')">Open Toggl</a></div>
        <div class="sdpi-item-child" style="margin-top: -6px"><a onclick="openPage('track.toggl.com/profile')">Get Toggl API Token</a></div>
        <div class="sdpi-item-child" style="margin-top: -6px"><a onclick="openPage('github.com/blueshiftone/streamdeck-toggl')">GitHub</a></div>
        <div class="sdpi-item-child" style="margin-top: -6px"><a onclick="clearTogglCache()">Clear Toggl Cache</a></div>
      </details>
    </div>
  </div>
</body>

</html>
